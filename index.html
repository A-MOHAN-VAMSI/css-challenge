<!DOCTYPE html>
<html>
<head>
  <title>CSS Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="hero">
    <h1>CSS Challenge</h1>
    <p>Flexbox • Grid • Animation</p>
  </section>

  <section id="flexbox">
    <h2>Flexbox Layout</h2>

    <div class="flex-container">

      <div class="card">
        <h3>Frontend</h3>
        <p>Responsive UI Development</p>
      </div>

      <div class="card">
        <h3>Backend</h3>
        <p>Server-side Logic</p>
      </div>

      <div class="card">
        <h3>Database</h3>
        <p>Data Management</p>
      </div>

    </div>
  </section>

  <section id="grid">
    <h2>CSS Grid Layout</h2>

    <div class="grid-container">

      <div class="grid-item">1</div>
      <div class="grid-item">2</div>
      <div class="grid-item">3</div>
      <div class="grid-item">4</div>
      <div class="grid-item">5</div>
      <div class="grid-item">6</div>

    </div>
  </section>

  <section id="animation">
    <h2>Animation Demo</h2>

    <button class="animated-btn">
      Hover Me
    </button>

  </section>

</body>
</html>
